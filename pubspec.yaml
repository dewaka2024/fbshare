name: fb_share_automation
description: Facebook Share-to-Group Automation Desktop App for Windows.
publish_to: 'none'
version: 4.7.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  webview_windows: ^0.3.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  path: ^1.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/scripts/fb_master_script.js
    - assets/scripts/fb_group_scraper.js
    - assets/scripts/fb_scrape_meta.js
